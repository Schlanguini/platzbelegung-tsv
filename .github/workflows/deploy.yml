name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "output/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
