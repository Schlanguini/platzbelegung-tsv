name: Update calendars

on:
  schedule:
    # 04:00 Berlin
    - cron: "0 2 * * *"   # Sommerzeit
    - cron: "0 3 * * *"   # Winterzeit

    # 12:00 Berlin
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"

    # 15:00 Berlin
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"

    # 19:00 Berlin
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"

    # 21:00 Berlin
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendars
        run: python scripts/update_calendars.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output/*.ics
          git commit -m "update calendars" || exit 0
          git push
